name: Threat Model CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  threat-model:
    name: Automated Threat Analysis
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r threat-modeler/requirements.txt httpx

      - name: Run threat model analysis
        id: atm
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python threat-modeler/cli/atm_cli.py analyze \
            --system-file system.json \
            --frameworks stride,dread \
            --threshold high \
            --output-json /tmp/atm_result.json \
            --output-md /tmp/atm_summary.md
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### 🛡 Threat Model Analysis';
            try { body = fs.readFileSync('/tmp/atm_summary.md', 'utf8'); } catch {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: threat-model-report
          path: /tmp/atm_result.json
          retention-days: 30
